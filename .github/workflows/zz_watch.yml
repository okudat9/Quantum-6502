name: ZZ_Watch — IBM Calib Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分おき（無料枠720回/月）
  workflow_dispatch:           # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # CSVをcommitするため

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install qiskit-ibm-runtime qiskit

      - name: Run calib monitor
        env:
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
          BACKEND_NAME: ibm_marrakesh
          TARGET_Q: "95"
          ANCILLA_Q: "94"
        run: python scripts/calib_monitor.py

      - name: Commit data
        run: |
          git config user.name  "ZZ_Watch Bot"
          git config user.email "bot@quantum-6502"
          git add data/t2_history.csv
          git diff --staged --quiet || \
            git commit -m "📡 calib $(date -u '+%Y-%m-%dT%H:%M')"
          git push
